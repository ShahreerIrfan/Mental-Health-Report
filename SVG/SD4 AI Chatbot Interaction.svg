<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" style="max-width:700px;width:100%;font-family:Segoe UI,Arial,sans-serif;background:#ffffff;border:1.5px solid #ccc;border-radius:8px;">
<defs><marker id="sq4" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#444"/></marker></defs>
<text x="350" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">SD4: AI Chatbot Interaction</text>
<rect x="35" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="80" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Patient</text>
<line x1="80" y1="77" x2="80" y2="420" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="165" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="210" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Frontend</text>
<line x1="210" y1="77" x2="210" y2="420" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="325" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="370" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">API Server</text>
<line x1="370" y1="77" x2="370" y2="420" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="505" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="550" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">AI Engine</text>
<line x1="550" y1="77" x2="550" y2="420" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<line x1="80" y1="102" x2="210" y2="102" stroke="#444" stroke-width="1.5" marker-end="url(#sq4)"/>
<text x="145" y="97" text-anchor="middle" font-size="9" fill="#333">1. Type chat message</text>
<line x1="210" y1="125" x2="370" y2="125" stroke="#444" stroke-width="1.5" marker-end="url(#sq4)"/>
<text x="290" y="120" text-anchor="middle" font-size="9" fill="#333">2. POST /chatbot/query</text>
<line x1="370" y1="149" x2="550" y2="149" stroke="#444" stroke-width="1.5" marker-end="url(#sq4)"/>
<text x="460" y="144" text-anchor="middle" font-size="9" fill="#333">3. Process NLP query</text>
<line x1="550" y1="173" x2="370" y2="173" stroke="#888" stroke-width="1.5" marker-end="url(#sq4)" stroke-dasharray="6 3"/>
<text x="460" y="168" text-anchor="middle" font-size="9" fill="#333">4. Response + confidence</text>
<line x1="370" y1="196" x2="370" y2="196" stroke="#444" stroke-width="1.5" marker-end="url(#sq4)" stroke-dasharray="6 3"/>
<text x="370" y="191" text-anchor="middle" font-size="9" fill="#333">5. Check confidence &gt;= 70%</text>
<line x1="370" y1="220" x2="210" y2="220" stroke="#888" stroke-width="1.5" marker-end="url(#sq4)" stroke-dasharray="6 3"/>
<text x="290" y="215" text-anchor="middle" font-size="9" fill="#333">6. Bot response</text>
<line x1="210" y1="244" x2="80" y2="244" stroke="#888" stroke-width="1.5" marker-end="url(#sq4)" stroke-dasharray="6 3"/>
<text x="145" y="239" text-anchor="middle" font-size="9" fill="#333">7. Display response (&lt;3s)</text>
<line x1="370" y1="267" x2="370" y2="267" stroke="#444" stroke-width="1.5" marker-end="url(#sq4)" stroke-dasharray="6 3"/>
<text x="370" y="262" text-anchor="middle" font-size="9" fill="#333">8. Store transcript</text>
<line x1="80" y1="291" x2="210" y2="291" stroke="#444" stroke-width="1.5" marker-end="url(#sq4)"/>
<text x="145" y="286" text-anchor="middle" font-size="9" fill="#333">9. Another query (low conf)</text>
<line x1="210" y1="315" x2="370" y2="315" stroke="#444" stroke-width="1.5" marker-end="url(#sq4)"/>
<text x="290" y="310" text-anchor="middle" font-size="9" fill="#333">10. POST /chatbot/query</text>
<line x1="370" y1="338" x2="550" y2="338" stroke="#444" stroke-width="1.5" marker-end="url(#sq4)"/>
<text x="460" y="333" text-anchor="middle" font-size="9" fill="#333">11. Process query</text>
<line x1="550" y1="362" x2="370" y2="362" stroke="#888" stroke-width="1.5" marker-end="url(#sq4)" stroke-dasharray="6 3"/>
<text x="460" y="357" text-anchor="middle" font-size="9" fill="#333">12. Confidence &lt; 70%</text>
<line x1="370" y1="386" x2="210" y2="386" stroke="#444" stroke-width="1.5" marker-end="url(#sq4)"/>
<text x="290" y="381" text-anchor="middle" font-size="9" fill="#333">13. Escalate to clinician</text>
</svg>