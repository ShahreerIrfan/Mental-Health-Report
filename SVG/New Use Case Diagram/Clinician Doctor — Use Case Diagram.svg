<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" style="font-family:'Segoe UI',Calibri,Arial,sans-serif;">
  <defs>
    <marker id="arrowC" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#555" stroke-width="1.2"/>
    </marker>
    <filter id="esC">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15" flood-color="#000"/>
    </filter>
  </defs>

  <!-- White Background -->
  <rect width="1000" height="620" fill="#ffffff"/>

  <!-- System Boundary Box -->
  <rect x="185" y="12" width="650" height="540" rx="8" fill="#48D1CC" stroke="#CC0000" stroke-width="3.5"/>

  <!-- Title -->
  <text x="510" y="42" text-anchor="middle" font-size="18" font-weight="bold" font-style="italic" fill="#333">Use Case Diagram for Clinician / Doctor</text>
  <text x="510" y="58" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Mental Health Support Platform</text>

  <!-- CLINICIAN ACTOR (Left) -->
  <g transform="translate(82,310)">
    <circle cx="0" cy="-28" r="14" fill="none" stroke="#4B0082" stroke-width="2.5"/>
    <line x1="0" y1="-14" x2="0" y2="18" stroke="#4B0082" stroke-width="2.5"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#4B0082" stroke-width="2.5"/>
    <line x1="0" y1="18" x2="-14" y2="40" stroke="#4B0082" stroke-width="2.5"/>
    <line x1="0" y1="18" x2="14" y2="40" stroke="#4B0082" stroke-width="2.5"/>
    <text x="0" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#4B0082">Clinician</text>
  </g>

  <!-- PATIENT ACTOR (Right) -->
  <g transform="translate(918,310)">
    <circle cx="0" cy="-28" r="14" fill="none" stroke="#800000" stroke-width="2.5"/>
    <line x1="0" y1="-14" x2="0" y2="18" stroke="#800000" stroke-width="2.5"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#800000" stroke-width="2.5"/>
    <line x1="0" y1="18" x2="-14" y2="40" stroke="#800000" stroke-width="2.5"/>
    <line x1="0" y1="18" x2="14" y2="40" stroke="#800000" stroke-width="2.5"/>
    <text x="0" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#800000">Patient</text>
  </g>

  <!-- Row 1: y=95 -->
  <ellipse cx="370" cy="95" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="370" y="100" text-anchor="middle" font-size="11.5" font-weight="600" fill="#333">Write Session Notes (FR16)</text>
  <ellipse cx="690" cy="95" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="690" y="100" text-anchor="middle" font-size="11.5" font-weight="600" fill="#333">View Patient History (FR18)</text>
  <line x1="500" y1="95" x2="560" y2="95" stroke="#555" stroke-width="1.5" stroke-dasharray="8 4" marker-end="url(#arrowC)"/>
  <text x="530" y="86" text-anchor="middle" font-size="9.5" font-weight="600" font-style="italic" fill="#555">&lt;&lt;include&gt;&gt;</text>

  <!-- Row 2: y=165 -->
  <ellipse cx="370" cy="165" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="370" y="170" text-anchor="middle" font-size="11.5" font-weight="600" fill="#333">Chat with Patient (FR24)</text>
  <ellipse cx="690" cy="165" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="690" y="170" text-anchor="middle" font-size="11.5" font-weight="600" fill="#333">Login / Logout (FR8)</text>
  <line x1="500" y1="165" x2="560" y2="165" stroke="#555" stroke-width="1.5" stroke-dasharray="8 4" marker-end="url(#arrowC)"/>
  <text x="530" y="156" text-anchor="middle" font-size="9.5" font-weight="600" font-style="italic" fill="#555">&lt;&lt;include&gt;&gt;</text>

  <!-- Row 3: y=235 -->
  <ellipse cx="370" cy="235" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="370" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Approve Appointments (FR14)</text>
  <ellipse cx="690" cy="235" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="690" y="240" text-anchor="middle" font-size="10.5" font-weight="600" fill="#333">View Schedule / Calendar (FR67)</text>
  <line x1="500" y1="235" x2="560" y2="235" stroke="#555" stroke-width="1.5" stroke-dasharray="8 4" marker-end="url(#arrowC)"/>
  <text x="530" y="226" text-anchor="middle" font-size="9.5" font-weight="600" font-style="italic" fill="#555">&lt;&lt;include&gt;&gt;</text>

  <!-- Row 4: y=305 -->
  <ellipse cx="370" cy="305" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="370" y="310" text-anchor="middle" font-size="10.5" font-weight="600" fill="#333">Request Medical Records (FR21)</text>
  <ellipse cx="690" cy="305" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="690" y="310" text-anchor="middle" font-size="11.5" font-weight="600" fill="#333">Reassign Patients (FR20)</text>
  <line x1="500" y1="305" x2="560" y2="305" stroke="#555" stroke-width="1.5" stroke-dasharray="8 4" marker-end="url(#arrowC)"/>
  <text x="530" y="296" text-anchor="middle" font-size="9.5" font-weight="600" font-style="italic" fill="#555">&lt;&lt;include&gt;&gt;</text>

  <!-- Row 5: y=375 -->
  <ellipse cx="370" cy="375" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="370" y="380" text-anchor="middle" font-size="11.5" font-weight="600" fill="#333">Upload Clinical Docs (FR51)</text>
  <ellipse cx="690" cy="375" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="690" y="380" text-anchor="middle" font-size="11.5" font-weight="600" fill="#333">Download Records (FR53)</text>
  <line x1="500" y1="375" x2="560" y2="375" stroke="#555" stroke-width="1.5" stroke-dasharray="8 4" marker-end="url(#arrowC)"/>
  <text x="530" y="366" text-anchor="middle" font-size="9.5" font-weight="600" font-style="italic" fill="#555">&lt;&lt;include&gt;&gt;</text>

  <!-- Row 6: y=445 -->
  <ellipse cx="370" cy="445" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="370" y="450" text-anchor="middle" font-size="10.5" font-weight="600" fill="#333">Access Patient Mood Data (FR29)</text>
  <ellipse cx="690" cy="445" rx="130" ry="24" fill="#FFA726" stroke="#E68A00" stroke-width="1.8" filter="url(#esC)"/>
  <text x="690" y="450" text-anchor="middle" font-size="10.5" font-weight="600" fill="#333">View Workload Metrics (FR70)</text>
  <line x1="500" y1="445" x2="560" y2="445" stroke="#555" stroke-width="1.5" stroke-dasharray="8 4" marker-end="url(#arrowC)"/>
  <text x="530" y="436" text-anchor="middle" font-size="9.5" font-weight="600" font-style="italic" fill="#555">&lt;&lt;include&gt;&gt;</text>

  <!-- CLINICIAN → USE CASE CONNECTIONS -->
  <line x1="102" y1="288" x2="240" y2="95" stroke="#444" stroke-width="1.2" opacity="0.5"/>
  <line x1="102" y1="293" x2="240" y2="165" stroke="#444" stroke-width="1.2" opacity="0.5"/>
  <line x1="102" y1="298" x2="240" y2="235" stroke="#444" stroke-width="1.2" opacity="0.5"/>
  <line x1="102" y1="310" x2="240" y2="305" stroke="#444" stroke-width="1.2" opacity="0.5"/>
  <line x1="102" y1="320" x2="240" y2="375" stroke="#444" stroke-width="1.2" opacity="0.5"/>
  <line x1="102" y1="325" x2="240" y2="445" stroke="#444" stroke-width="1.2" opacity="0.5"/>

  <!-- PATIENT → USE CASE CONNECTIONS (dashed, right side) -->
  <line x1="898" y1="290" x2="820" y2="95" stroke="#800000" stroke-width="1.2" stroke-dasharray="6 3" opacity="0.5"/>
  <line x1="898" y1="295" x2="820" y2="165" stroke="#800000" stroke-width="1.2" stroke-dasharray="6 3" opacity="0.5"/>
  <line x1="898" y1="300" x2="820" y2="235" stroke="#800000" stroke-width="1.2" stroke-dasharray="6 3" opacity="0.5"/>
  <line x1="898" y1="320" x2="820" y2="375" stroke="#800000" stroke-width="1.2" stroke-dasharray="6 3" opacity="0.5"/>

  <!-- Footer -->
  <text x="510" y="580" text-anchor="middle" font-size="9" fill="#666" font-style="italic">Figure 5.2 — Clinician/Doctor Use Case Diagram | Mental Health Support Platform | Mel23 Tech Solution</text>
  <text x="510" y="595" text-anchor="middle" font-size="8" fill="#999">© 2026 Mel23 Tech Solution — Kent Institute of Technology Australia</text>
</svg>