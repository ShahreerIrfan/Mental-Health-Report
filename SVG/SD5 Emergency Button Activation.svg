<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" style="max-width:750px;width:100%;font-family:Segoe UI,Arial,sans-serif;background:#ffffff;border:1.5px solid #ccc;border-radius:8px;">
<defs><marker id="sq5" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#444"/></marker></defs>
<text x="375" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">SD5: Emergency Button Activation</text>
<rect x="25" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="70" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Patient</text>
<line x1="70" y1="77" x2="70" y2="400" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="155" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="200" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Frontend</text>
<line x1="200" y1="77" x2="200" y2="400" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="315" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="360" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">API Server</text>
<line x1="360" y1="77" x2="360" y2="400" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="475" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="520" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Database</text>
<line x1="520" y1="77" x2="520" y2="400" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="615" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="660" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Crisis Svc</text>
<line x1="660" y1="77" x2="660" y2="400" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<line x1="70" y1="102" x2="200" y2="102" stroke="#444" stroke-width="1.5" marker-end="url(#sq5)"/>
<text x="135" y="97" text-anchor="middle" font-size="9" fill="#333">1. Press emergency button</text>
<line x1="200" y1="138" x2="360" y2="138" stroke="#444" stroke-width="1.5" marker-end="url(#sq5)"/>
<text x="280" y="133" text-anchor="middle" font-size="9" fill="#333">2. POST /emergency/activate</text>
<line x1="360" y1="174" x2="520" y2="174" stroke="#444" stroke-width="1.5" marker-end="url(#sq5)"/>
<text x="440" y="169" text-anchor="middle" font-size="9" fill="#333">3. INSERT emergency log</text>
<line x1="360" y1="210" x2="660" y2="210" stroke="#444" stroke-width="1.5" marker-end="url(#sq5)"/>
<text x="510" y="205" text-anchor="middle" font-size="9" fill="#333">4. Fetch local hotlines</text>
<line x1="660" y1="246" x2="360" y2="246" stroke="#888" stroke-width="1.5" marker-end="url(#sq5)" stroke-dasharray="6 3"/>
<text x="510" y="241" text-anchor="middle" font-size="9" fill="#333">5. Hotline data</text>
<line x1="360" y1="282" x2="200" y2="282" stroke="#888" stroke-width="1.5" marker-end="url(#sq5)" stroke-dasharray="6 3"/>
<text x="280" y="277" text-anchor="middle" font-size="9" fill="#333">6. Crisis info + hotlines</text>
<line x1="200" y1="318" x2="70" y2="318" stroke="#888" stroke-width="1.5" marker-end="url(#sq5)" stroke-dasharray="6 3"/>
<text x="135" y="313" text-anchor="middle" font-size="9" fill="#333">7. Display crisis info (&lt;1s)</text>
<line x1="360" y1="354" x2="520" y2="354" stroke="#444" stroke-width="1.5" marker-end="url(#sq5)"/>
<text x="440" y="349" text-anchor="middle" font-size="9" fill="#333">8. INSERT audit trail</text>
</svg>