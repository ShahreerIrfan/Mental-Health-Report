<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" style="max-width:400px;width:100%;font-family:'Comic Sans MS','Segoe UI',sans-serif;background:#fff;border:2px solid #888;">
  <rect x="0" y="0" width="400" height="500" fill="#f9f9f9"/>
  <!-- Header -->
  <rect x="30" y="20" width="340" height="40" rx="3" fill="#ddd" stroke="#999" stroke-width="1"/>
  <text x="200" y="47" text-anchor="middle" fill="#555" font-size="16" font-weight="bold">Mental Health Support Platform</text>
  <!-- Logo placeholder -->
  <rect x="160" y="75" width="80" height="50" rx="5" fill="#ccc" stroke="#999" stroke-width="1"/>
  <text x="200" y="105" text-anchor="middle" fill="#777" font-size="10">LOGO</text>
  <!-- Form -->
  <text x="200" y="155" text-anchor="middle" fill="#444" font-size="18" font-weight="bold">Welcome Back</text>
  <text x="60" y="185" fill="#555" font-size="12">Email Address</text>
  <rect x="50" y="192" width="300" height="32" rx="3" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="65" y="213" fill="#aaa" font-size="11">user@example.com</text>
  <text x="60" y="245" fill="#555" font-size="12">Password</text>
  <rect x="50" y="252" width="300" height="32" rx="3" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="65" y="273" fill="#aaa" font-size="11">••••••••</text>
  <text x="280" y="300" fill="#2980b9" font-size="11" text-decoration="underline">Forgot Password?</text>
  <!-- Button -->
  <rect x="50" y="315" width="300" height="38" rx="5" fill="#2980b9" stroke="#2471a3" stroke-width="1"/>
  <text x="200" y="340" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">[ Login ]</text>
  <!-- Divider -->
  <line x1="50" y1="375" x2="350" y2="375" stroke="#ccc" stroke-width="1"/>
  <text x="200" y="380" text-anchor="middle" fill="#aaa" font-size="10">or</text>
  <text x="200" y="405" text-anchor="middle" fill="#555" font-size="12">Don't have an account? <tspan fill="#2980b9" text-decoration="underline">Sign Up</tspan></text>
  <!-- Emergency -->
  <rect x="120" y="430" width="160" height="32" rx="16" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="200" y="451" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Emergency Support</text>
</svg>