<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 680" style="max-width:1050px;width:100%;font-family:'Segoe UI',Arial,sans-serif;font-size:10px;">
  <!-- Root -->
