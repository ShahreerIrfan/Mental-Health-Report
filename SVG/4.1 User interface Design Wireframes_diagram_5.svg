<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" style="max-width:700px;width:100%;font-family:'Comic Sans MS','Segoe UI',sans-serif;background:#fff;border:2px solid #888;">
  <rect x="0" y="0" width="700" height="400" fill="#f5f5f5"/>
  <text x="30" y="35" fill="#2c3e50" font-size="16" font-weight="bold">Appointments</text>
  <!-- Upcoming -->
  <rect x="20" y="50" width="660" height="140" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="75" fill="#2c3e50" font-size="13" font-weight="bold">Upcoming Appointments</text>
  <rect x="40" y="90" width="615" height="30" fill="#eaf2f8" rx="3"/>
  <text x="55" y="110" fill="#555" font-size="11">Apr 15 | 10:00 AM | Dr. Smith | General Consultation | <tspan fill="#27ae60">Confirmed</tspan></text>
  <rect x="40" y="125" width="615" height="30" fill="#fff" rx="3" stroke="#eee" stroke-width="1"/>
  <text x="55" y="145" fill="#555" font-size="11">Apr 22 | 2:00 PM | Dr. Johnson | Follow-up | <tspan fill="#f39c12">Pending Approval</tspan></text>

  <!-- Book new -->
  <rect x="20" y="205" width="320" height="180" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="230" fill="#2c3e50" font-size="13" font-weight="bold">Book New Appointment</text>
  <text x="40" y="255" fill="#555" font-size="11">Select Clinician</text>
  <rect x="40" y="262" width="280" height="26" rx="3" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="290" y="280" fill="#888" font-size="10">▼</text>
  <text x="40" y="305" fill="#555" font-size="11">Select Date &amp; Time</text>
  <rect x="40" y="312" width="135" height="26" rx="3" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="55" y="330" fill="#aaa" font-size="10">📅 Date</text>
  <rect x="185" y="312" width="135" height="26" rx="3" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="200" y="330" fill="#aaa" font-size="10">🕐 Time</text>
  <rect x="200" y="350" width="120" height="28" rx="5" fill="#2980b9"/>
  <text x="260" y="369" text-anchor="middle" fill="#fff" font-size="11">[ Book Now ]</text>

  <!-- Calendar preview -->
  <rect x="360" y="205" width="320" height="180" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="380" y="230" fill="#2c3e50" font-size="13" font-weight="bold">Calendar View</text>
  <rect x="380" y="240" width="280" height="130" rx="4" fill="#f5f5f5"/>
  <text x="520" y="310" text-anchor="middle" fill="#888" font-size="11">[Interactive Calendar Widget]</text>
  <text x="520" y="330" text-anchor="middle" fill="#888" font-size="9">Synced with Google Calendar</text>
</svg>