<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" style="max-width:750px;width:100%;font-family:Segoe UI,Arial,sans-serif;background:#ffffff;border:1.5px solid #ccc;border-radius:8px;">
<defs><marker id="sq2" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#444"/></marker></defs>
<text x="375" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">SD2: Appointment Booking Flow</text>
<rect x="25" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="70" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Patient</text>
<line x1="70" y1="77" x2="70" y2="480" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="155" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="200" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Frontend</text>
<line x1="200" y1="77" x2="200" y2="480" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="315" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="360" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">API Server</text>
<line x1="360" y1="77" x2="360" y2="480" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="475" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="520" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Database</text>
<line x1="520" y1="77" x2="520" y2="480" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="615" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="660" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">G-Calendar</text>
<line x1="660" y1="77" x2="660" y2="480" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<line x1="70" y1="102" x2="200" y2="102" stroke="#444" stroke-width="1.5" marker-end="url(#sq2)"/>
<text x="135" y="97" text-anchor="middle" font-size="9" fill="#333">1. Select date &amp; clinician</text>
<line x1="200" y1="130" x2="360" y2="130" stroke="#444" stroke-width="1.5" marker-end="url(#sq2)"/>
<text x="280" y="125" text-anchor="middle" font-size="9" fill="#333">2. GET /appointments/slots</text>
<line x1="360" y1="158" x2="520" y2="158" stroke="#444" stroke-width="1.5" marker-end="url(#sq2)"/>
<text x="440" y="153" text-anchor="middle" font-size="9" fill="#333">3. SELECT available slots</text>
<line x1="520" y1="186" x2="360" y2="186" stroke="#888" stroke-width="1.5" marker-end="url(#sq2)" stroke-dasharray="6 3"/>
<text x="440" y="181" text-anchor="middle" font-size="9" fill="#333">4. Available slots list</text>
<line x1="360" y1="215" x2="200" y2="215" stroke="#888" stroke-width="1.5" marker-end="url(#sq2)" stroke-dasharray="6 3"/>
<text x="280" y="210" text-anchor="middle" font-size="9" fill="#333">5. Available slots</text>
<line x1="70" y1="243" x2="200" y2="243" stroke="#444" stroke-width="1.5" marker-end="url(#sq2)"/>
<text x="135" y="238" text-anchor="middle" font-size="9" fill="#333">6. Confirm booking</text>
<line x1="200" y1="271" x2="360" y2="271" stroke="#444" stroke-width="1.5" marker-end="url(#sq2)"/>
<text x="280" y="266" text-anchor="middle" font-size="9" fill="#333">7. POST /appointments</text>
<line x1="360" y1="300" x2="520" y2="300" stroke="#444" stroke-width="1.5" marker-end="url(#sq2)"/>
<text x="440" y="295" text-anchor="middle" font-size="9" fill="#333">8. INSERT appointment</text>
<line x1="360" y1="328" x2="660" y2="328" stroke="#444" stroke-width="1.5" marker-end="url(#sq2)"/>
<text x="510" y="323" text-anchor="middle" font-size="9" fill="#333">9. Sync to Google Calendar</text>
<line x1="660" y1="356" x2="360" y2="356" stroke="#888" stroke-width="1.5" marker-end="url(#sq2)" stroke-dasharray="6 3"/>
<text x="510" y="351" text-anchor="middle" font-size="9" fill="#333">10. Calendar event ID</text>
<line x1="520" y1="385" x2="360" y2="385" stroke="#888" stroke-width="1.5" marker-end="url(#sq2)" stroke-dasharray="6 3"/>
<text x="440" y="380" text-anchor="middle" font-size="9" fill="#333">11. Appointment created</text>
<line x1="360" y1="413" x2="200" y2="413" stroke="#888" stroke-width="1.5" marker-end="url(#sq2)" stroke-dasharray="6 3"/>
<text x="280" y="408" text-anchor="middle" font-size="9" fill="#333">12. Booking confirmation</text>
<line x1="200" y1="441" x2="70" y2="441" stroke="#444" stroke-width="1.5" marker-end="url(#sq2)"/>
<text x="135" y="436" text-anchor="middle" font-size="9" fill="#333">13. Email notification sent</text>
</svg>