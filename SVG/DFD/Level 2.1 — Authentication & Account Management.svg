<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580" style="width:100%;font-family:'Segoe UI',Calibri,Arial,sans-serif;">
<defs>
  <marker id="ah" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#546e7a"/></marker>
  <marker id="ahB" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#1565c0"/></marker>
  <marker id="ahG" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#388e3c"/></marker>
</defs>
<rect width="920" height="580" fill="#fff"/>

<!-- ═══════════ TITLE BAR ═══════════ -->
<rect x="0" y="0" width="920" height="44" fill="#1a5276" rx="4"/>
<text x="460" y="29" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">Level 2.1 — Authentication &amp; Account Management</text>
<text x="460" y="572" text-anchor="middle" font-size="8" fill="#aaa">Mental Health Support Platform · Gane &amp; Sarson Notation</text>

<!-- ═══════════════════════════════════════════ -->
<!--         EXTERNAL ENTITY — E1               -->
<!-- ═══════════════════════════════════════════ -->
<rect x="370" y="56" width="160" height="38" fill="#f8cecc" stroke="#b85450" stroke-width="2" rx="3"/>
<text x="450" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#922b21">E1: Patient / User</text>

<!-- ═══════════════════════════════════════════ -->
<!--       ROW 1 PROCESSES (y=145)              -->
<!-- ═══════════════════════════════════════════ -->
<!-- 1.1 Register User -->
<g transform="translate(30,145)">
  <rect width="148" height="66" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <line x1="0" y1="22" x2="148" y2="22" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="74" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">1.1</text>
  <text x="74" y="38" text-anchor="middle" font-size="9.5" fill="#1a5276">Register User</text>
  <text x="74" y="50" text-anchor="middle" font-size="9.5" fill="#1a5276">(Create Account)</text>
  <text x="74" y="62" text-anchor="middle" font-size="7" fill="#888">FR1</text>
</g>
<!-- 1.2 Verify OTP -->
<g transform="translate(228,145)">
  <rect width="148" height="66" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <line x1="0" y1="22" x2="148" y2="22" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="74" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">1.2</text>
  <text x="74" y="38" text-anchor="middle" font-size="9.5" fill="#1a5276">Verify OTP</text>
  <text x="74" y="50" text-anchor="middle" font-size="9.5" fill="#1a5276">(Email Verification)</text>
  <text x="74" y="62" text-anchor="middle" font-size="7" fill="#888">FR2</text>
</g>
<!-- 1.3 Lock Account -->
<g transform="translate(426,145)">
  <rect width="148" height="66" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <line x1="0" y1="22" x2="148" y2="22" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="74" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">1.3</text>
  <text x="74" y="38" text-anchor="middle" font-size="9.5" fill="#1a5276">Lock Account</text>
  <text x="74" y="50" text-anchor="middle" font-size="9.5" fill="#1a5276">(Failed Attempts)</text>
  <text x="74" y="62" text-anchor="middle" font-size="7" fill="#888">FR3</text>
</g>
<!-- 1.5 Password Reset -->
<g transform="translate(624,145)">
  <rect width="148" height="66" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <line x1="0" y1="22" x2="148" y2="22" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="74" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">1.5</text>
  <text x="74" y="38" text-anchor="middle" font-size="9.5" fill="#1a5276">Password</text>
  <text x="74" y="50" text-anchor="middle" font-size="9.5" fill="#1a5276">Reset</text>
  <text x="74" y="62" text-anchor="middle" font-size="7" fill="#888">FR5</text>
</g>

<!-- ═══════════════════════════════════════════ -->
<!--       ROW 2 PROCESSES (y=300)              -->
<!-- ═══════════════════════════════════════════ -->
<!-- 1.4 Log Login Activity -->
<g transform="translate(120,300)">
  <rect width="148" height="66" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <line x1="0" y1="22" x2="148" y2="22" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="74" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">1.4</text>
  <text x="74" y="38" text-anchor="middle" font-size="9.5" fill="#1a5276">Log Login</text>
  <text x="74" y="50" text-anchor="middle" font-size="9.5" fill="#1a5276">Activity</text>
  <text x="74" y="62" text-anchor="middle" font-size="7" fill="#888">FR4</text>
</g>
<!-- 1.6 Login / Logout -->
<g transform="translate(350,300)">
  <rect width="148" height="66" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <line x1="0" y1="22" x2="148" y2="22" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="74" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">1.6</text>
  <text x="74" y="38" text-anchor="middle" font-size="9.5" fill="#1a5276">Login / Logout</text>
  <text x="74" y="50" text-anchor="middle" font-size="9.5" fill="#1a5276">(Session Mgmt)</text>
  <text x="74" y="62" text-anchor="middle" font-size="7" fill="#888">FR8</text>
</g>
<!-- 1.7 Delete & Anonymize -->
<g transform="translate(580,300)">
  <rect width="148" height="66" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <line x1="0" y1="22" x2="148" y2="22" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="74" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">1.7</text>
  <text x="74" y="38" text-anchor="middle" font-size="9.5" fill="#1a5276">Delete &amp;</text>
  <text x="74" y="50" text-anchor="middle" font-size="9.5" fill="#1a5276">Anonymize Account</text>
  <text x="74" y="62" text-anchor="middle" font-size="7" fill="#888">FR8d</text>
</g>

<!-- ═══════════════════════════════════════════ -->
<!--              DATA STORES (y=460)           -->
<!-- ═══════════════════════════════════════════ -->
<!-- D1 Users & Credentials -->
<g transform="translate(30,460)">
  <rect width="190" height="32" fill="#d5f5e3" stroke="none"/>
  <line x1="0" y1="0" x2="190" y2="0" stroke="#82b366" stroke-width="2"/>
  <line x1="0" y1="32" x2="190" y2="32" stroke="#82b366" stroke-width="2"/>
  <line x1="0" y1="0" x2="0" y2="32" stroke="#82b366" stroke-width="2"/>
  <line x1="40" y1="0" x2="40" y2="32" stroke="#82b366" stroke-width="1.2"/>
  <text x="20" y="21" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e8449">D1</text>
  <text x="115" y="21" text-anchor="middle" font-size="9" fill="#1e8449">Users &amp; Credentials</text>
</g>
<!-- D12 Audit Logs -->
<g transform="translate(330,460)">
  <rect width="190" height="32" fill="#d5f5e3" stroke="none"/>
  <line x1="0" y1="0" x2="190" y2="0" stroke="#82b366" stroke-width="2"/>
  <line x1="0" y1="32" x2="190" y2="32" stroke="#82b366" stroke-width="2"/>
  <line x1="0" y1="0" x2="0" y2="32" stroke="#82b366" stroke-width="2"/>
  <line x1="40" y1="0" x2="40" y2="32" stroke="#82b366" stroke-width="1.2"/>
  <text x="20" y="21" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e8449">D12</text>
  <text x="115" y="21" text-anchor="middle" font-size="9" fill="#1e8449">Audit Logs</text>
</g>
<!-- D15 Session Data -->
<g transform="translate(630,460)">
  <rect width="190" height="32" fill="#d5f5e3" stroke="none"/>
  <line x1="0" y1="0" x2="190" y2="0" stroke="#82b366" stroke-width="2"/>
  <line x1="0" y1="32" x2="190" y2="32" stroke="#82b366" stroke-width="2"/>
  <line x1="0" y1="0" x2="0" y2="32" stroke="#82b366" stroke-width="2"/>
  <line x1="40" y1="0" x2="40" y2="32" stroke="#82b366" stroke-width="1.2"/>
  <text x="20" y="21" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e8449">D15</text>
  <text x="115" y="21" text-anchor="middle" font-size="9" fill="#1e8449">Session Data</text>
</g>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--                 E1 → PROCESS ARROWS                        -->
<!--  Route through channels ABOVE Row 1 and BETWEEN rows      -->
<!-- ═══════════════════════════════════════════════════════════ -->

<!-- E1 → 1.1  Registration  (channel y=115, above R1) -->
<polyline points="410,94 410,115 104,115 104,145" fill="none" stroke="#546e7a" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="240" y="111" font-size="8" fill="#546e7a" font-style="italic">Registration</text>

<!-- E1 → 1.2  OTP Code  (channel y=120) -->
<polyline points="430,94 430,120 302,120 302,145" fill="none" stroke="#546e7a" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="355" y="117" font-size="8" fill="#546e7a" font-style="italic">OTP Code</text>

<!-- E1 → 1.5  Reset Request  (channel y=118) -->
<polyline points="490,94 490,118 698,118 698,145" fill="none" stroke="#546e7a" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="570" y="113" font-size="8" fill="#546e7a" font-style="italic">Reset Request</text>

<!-- E1 → 1.6  Login Request  (route through gap between 1.2 & 1.3, x=397) -->
<polyline points="450,94 450,108 397,108 397,270 424,270 424,300" fill="none" stroke="#546e7a" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="400" y="240" font-size="8" fill="#546e7a" font-style="italic" writing-mode="tb">Login Req</text>

<!-- 1.6 → E1  Auth Token  (route up through gap x=405) -->
<polyline points="424,300 424,275 405,275 405,112 440,112 440,94" fill="none" stroke="#546e7a" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="408" y="240" font-size="8" fill="#546e7a" font-style="italic" writing-mode="tb">Auth Token</text>

<!-- E1 → 1.7  Delete Request  (route right of R1, x=790) -->
<polyline points="510,94 510,108 790,108 790,270 654,270 654,300" fill="none" stroke="#546e7a" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="720" y="240" font-size="8" fill="#546e7a" font-style="italic" writing-mode="tb">Delete Req</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--            INTER-PROCESS ARROWS (Blue)                     -->
<!-- ═══════════════════════════════════════════════════════════ -->

<!-- 1.1 → 1.2  Account Created  (direct horizontal) -->
<polyline points="178,178 228,178" fill="none" stroke="#1565c0" stroke-width="1.6" marker-end="url(#ahB)"/>
<text x="182" y="173" font-size="7.5" fill="#1565c0" font-style="italic">Account Created</text>

<!-- 1.2 → 1.3  Failed Attempts  (direct horizontal) -->
<polyline points="376,178 426,178" fill="none" stroke="#1565c0" stroke-width="1.6" marker-end="url(#ahB)"/>
<text x="382" y="173" font-size="7.5" fill="#1565c0" font-style="italic">Failed Attempts</text>

<!-- 1.6 → 1.4  Login Event  (direct horizontal, right to left) -->
<polyline points="350,333 268,333" fill="none" stroke="#1565c0" stroke-width="1.6" marker-end="url(#ahB)"/>
<text x="280" y="328" font-size="7.5" fill="#1565c0" font-style="italic">Login Event</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--       PROCESS → DATA STORE ARROWS (Green)                 -->
<!--  Routed through horizontal channels BETWEEN rows          -->
<!-- ═══════════════════════════════════════════════════════════ -->

<!-- 1.1 → D1  New User  (left margin route) -->
<polyline points="104,211 104,250 55,250 55,460" fill="none" stroke="#388e3c" stroke-width="1.5" marker-end="url(#ahG)"/>
<text x="58" y="360" font-size="7.5" fill="#388e3c" font-style="italic" writing-mode="tb">New User</text>

<!-- 1.2 → D1  Verified  (route channel y=255) -->
<polyline points="302,211 302,255 68,255 68,460" fill="none" stroke="#388e3c" stroke-width="1.5" marker-end="url(#ahG)"/>
<text x="160" y="251" font-size="7.5" fill="#388e3c" font-style="italic">Verified</text>

<!-- 1.3 → D1  Lock Flag  (route channel y=260) -->
<polyline points="500,211 500,260 82,260 82,460" fill="none" stroke="#388e3c" stroke-width="1.5" marker-end="url(#ahG)"/>
<text x="260" y="257" font-size="7.5" fill="#388e3c" font-style="italic">Lock Flag</text>

<!-- 1.5 → D1  New Password  (route channel y=245) -->
<polyline points="698,211 698,245 95,245 95,460" fill="none" stroke="#388e3c" stroke-width="1.5" marker-end="url(#ahG)"/>
<text x="360" y="241" font-size="7.5" fill="#388e3c" font-style="italic">New Password</text>

<!-- 1.7 → D1  Anonymized  (route channel y=405) -->
<polyline points="654,366 654,405 108,405 108,460" fill="none" stroke="#388e3c" stroke-width="1.5" marker-end="url(#ahG)"/>
<text x="340" y="401" font-size="7.5" fill="#388e3c" font-style="italic">Anonymized</text>

<!-- 1.4 → D12  Login Log  (route channel y=415) -->
<polyline points="194,366 194,415 425,415 425,460" fill="none" stroke="#388e3c" stroke-width="1.5" marker-end="url(#ahG)"/>
<text x="280" y="411" font-size="7.5" fill="#388e3c" font-style="italic">Login Log</text>

<!-- 1.7 → D15  Session  (direct vertical) -->
<polyline points="680,366 680,420 725,420 725,460" fill="none" stroke="#388e3c" stroke-width="1.5" marker-end="url(#ahG)"/>
<text x="684" y="418" font-size="7.5" fill="#388e3c" font-style="italic">Session</text>

