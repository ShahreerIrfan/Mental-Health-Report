<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" style="max-width:700px;width:100%;font-family:Segoe UI,Arial,sans-serif;background:#ffffff;border:1.5px solid #ccc;border-radius:8px;">
<defs><marker id="sq3" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#444"/></marker></defs>
<text x="350" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">SD3: Mood Entry &amp; Risk Alert</text>
<rect x="35" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="80" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Patient</text>
<line x1="80" y1="77" x2="80" y2="440" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="175" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="220" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Frontend</text>
<line x1="220" y1="77" x2="220" y2="440" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="335" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="380" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">API Server</text>
<line x1="380" y1="77" x2="380" y2="440" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<rect x="505" y="45" width="90" height="32" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" rx="4"/>
<text x="550" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Database</text>
<line x1="550" y1="77" x2="550" y2="440" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
<line x1="80" y1="102" x2="220" y2="102" stroke="#444" stroke-width="1.5" marker-end="url(#sq3)"/>
<text x="150" y="97" text-anchor="middle" font-size="9" fill="#333">1. Submit mood (1-5 scale)</text>
<line x1="220" y1="131" x2="380" y2="131" stroke="#444" stroke-width="1.5" marker-end="url(#sq3)"/>
<text x="300" y="126" text-anchor="middle" font-size="9" fill="#333">2. POST /mood/entry</text>
<line x1="380" y1="161" x2="550" y2="161" stroke="#444" stroke-width="1.5" marker-end="url(#sq3)"/>
<text x="465" y="156" text-anchor="middle" font-size="9" fill="#333">3. Check duplicate (24h)</text>
<line x1="550" y1="191" x2="380" y2="191" stroke="#888" stroke-width="1.5" marker-end="url(#sq3)" stroke-dasharray="6 3"/>
<text x="465" y="186" text-anchor="middle" font-size="9" fill="#333">4. No duplicate</text>
<line x1="380" y1="221" x2="550" y2="221" stroke="#444" stroke-width="1.5" marker-end="url(#sq3)"/>
<text x="465" y="216" text-anchor="middle" font-size="9" fill="#333">5. INSERT mood entry</text>
<line x1="380" y1="251" x2="550" y2="251" stroke="#444" stroke-width="1.5" marker-end="url(#sq3)"/>
<text x="465" y="246" text-anchor="middle" font-size="9" fill="#333">6. SELECT last 3 entries</text>
<line x1="550" y1="280" x2="380" y2="280" stroke="#888" stroke-width="1.5" marker-end="url(#sq3)" stroke-dasharray="6 3"/>
<text x="465" y="275" text-anchor="middle" font-size="9" fill="#333">7. Consecutive entries &lt;2</text>
<line x1="380" y1="310" x2="380" y2="310" stroke="#444" stroke-width="1.5" marker-end="url(#sq3)" stroke-dasharray="6 3"/>
<text x="380" y="305" text-anchor="middle" font-size="9" fill="#333">8. Trigger risk alert</text>
<line x1="380" y1="340" x2="550" y2="340" stroke="#444" stroke-width="1.5" marker-end="url(#sq3)"/>
<text x="465" y="335" text-anchor="middle" font-size="9" fill="#333">9. INSERT notification</text>
<line x1="380" y1="370" x2="220" y2="370" stroke="#888" stroke-width="1.5" marker-end="url(#sq3)" stroke-dasharray="6 3"/>
<text x="300" y="365" text-anchor="middle" font-size="9" fill="#333">10. Mood recorded + warning</text>
<line x1="220" y1="400" x2="80" y2="400" stroke="#888" stroke-width="1.5" marker-end="url(#sq3)" stroke-dasharray="6 3"/>
<text x="150" y="395" text-anchor="middle" font-size="9" fill="#333">11. Dashboard updated</text>
</svg>