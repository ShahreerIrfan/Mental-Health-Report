<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" style="max-width:800px;width:100%;font-family:'Comic Sans MS','Segoe UI',sans-serif;background:#fff;border:2px solid #888;">
  <rect x="0" y="0" width="800" height="520" fill="#f5f5f5"/>
  <!-- Top nav -->
  <rect x="0" y="0" width="800" height="45" fill="#2980b9"/>
  <text x="20" y="30" fill="#fff" font-size="14" font-weight="bold">MH Platform</text>
  <text x="700" y="30" fill="#fff" font-size="12">John Doe ▼</text>
  <circle cx="670" cy="24" r="12" fill="#fff" opacity="0.3"/>
  <!-- Sidebar -->
  <rect x="0" y="45" width="180" height="475" fill="#ecf0f1" stroke="#ddd" stroke-width="1"/>
  <text x="20" y="75" fill="#2980b9" font-size="12" font-weight="bold">Dashboard</text>
  <text x="20" y="100" fill="#555" font-size="12">Mood Tracker</text>
  <text x="20" y="125" fill="#555" font-size="12">Appointments</text>
  <text x="20" y="150" fill="#555" font-size="12">Messages</text>
  <text x="20" y="175" fill="#555" font-size="12">Resources</text>
  <text x="20" y="200" fill="#555" font-size="12">AI Chatbot</text>
  <text x="20" y="225" fill="#555" font-size="12">Profile</text>
  <rect x="10" y="470" width="160" height="30" rx="15" fill="#e74c3c"/>
  <text x="90" y="490" text-anchor="middle" fill="#fff" font-size="11">Emergency</text>

  <!-- Main content -->
  <text x="200" y="75" fill="#2c3e50" font-size="16" font-weight="bold">Welcome, John!</text>
  <text x="200" y="92" fill="#777" font-size="11">Here's your mental health summary</text>

  <!-- Mood card -->
  <rect x="200" y="105" width="280" height="130" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="220" y="130" fill="#2c3e50" font-size="13" font-weight="bold">Today's Mood</text>
  <rect x="220" y="140" width="240" height="70" rx="4" fill="#eaf2f8"/>
  <text x="340" y="180" text-anchor="middle" fill="#888" font-size="10">[Mood Chart - 7 day trend]</text>
  <text x="220" y="225" fill="#27ae60" font-size="12">Score: 7/10 ✓</text>

  <!-- Upcoming apt card -->
  <rect x="500" y="105" width="280" height="130" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="520" y="130" fill="#2c3e50" font-size="13" font-weight="bold">Upcoming Appointment</text>
  <text x="520" y="155" fill="#555" font-size="11">Dr. Smith - Apr 15, 10:00 AM</text>
  <text x="520" y="175" fill="#777" font-size="10">General Consultation</text>
  <rect x="520" y="190" width="100" height="26" rx="4" fill="#2980b9"/>
  <text x="570" y="208" text-anchor="middle" fill="#fff" font-size="10">[ Reschedule ]</text>

  <!-- Messages card -->
  <rect x="200" y="250" width="280" height="120" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="220" y="275" fill="#2c3e50" font-size="13" font-weight="bold">Recent Messages</text>
  <text x="220" y="298" fill="#555" font-size="11">Dr. Smith: "How are you feeling..."</text>
  <text x="220" y="318" fill="#777" font-size="10">2 hours ago</text>
  <text x="220" y="340" fill="#555" font-size="11">AI Bot: "Based on your mood..."</text>
  <text x="220" y="355" fill="#777" font-size="10">Yesterday</text>

  <!-- Resources card -->
  <rect x="500" y="250" width="280" height="120" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="520" y="275" fill="#2c3e50" font-size="13" font-weight="bold">Recommended Resources</text>
  <text x="520" y="298" fill="#2980b9" font-size="11">• Managing Daily Stress</text>
  <text x="520" y="318" fill="#2980b9" font-size="11">• Mindfulness Exercises</text>
  <text x="520" y="338" fill="#2980b9" font-size="11">• Building Resilience</text>

  <!-- Quick actions -->
  <rect x="200" y="390" width="140" height="50" rx="6" fill="#27ae60"/>
  <text x="270" y="420" text-anchor="middle" fill="#fff" font-size="11">[ Log Mood ]</text>
  <rect x="360" y="390" width="140" height="50" rx="6" fill="#2980b9"/>
  <text x="430" y="420" text-anchor="middle" fill="#fff" font-size="11">[ Book Apt ]</text>
  <rect x="520" y="390" width="140" height="50" rx="6" fill="#8e44ad"/>
  <text x="590" y="420" text-anchor="middle" fill="#fff" font-size="11">[ Chat with AI ]</text>
</svg>