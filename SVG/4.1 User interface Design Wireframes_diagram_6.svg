<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="max-width:800px;width:100%;font-family:'Comic Sans MS','Segoe UI',sans-serif;background:#fff;border:2px solid #888;">
  <rect x="0" y="0" width="800" height="420" fill="#f5f5f5"/>
  <rect x="0" y="0" width="800" height="45" fill="#1a5276"/>
  <text x="20" y="30" fill="#fff" font-size="14" font-weight="bold">Admin Panel</text>
  <text x="700" y="30" fill="#fff" font-size="12">Admin ▼</text>

  <!-- Stat cards -->
  <rect x="20" y="60" width="180" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="85" fill="#777" font-size="10">Total Users</text>
  <text x="40" y="115" fill="#2c3e50" font-size="24" font-weight="bold">1,247</text>
  <text x="130" y="115" fill="#27ae60" font-size="10">+12%</text>

  <rect x="215" y="60" width="180" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="235" y="85" fill="#777" font-size="10">Active Sessions</text>
  <text x="235" y="115" fill="#2c3e50" font-size="24" font-weight="bold">42</text>
  <text x="285" y="115" fill="#2980b9" font-size="10">live</text>

  <rect x="410" y="60" width="180" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="430" y="85" fill="#777" font-size="10">Appointments Today</text>
  <text x="430" y="115" fill="#2c3e50" font-size="24" font-weight="bold">18</text>

  <rect x="605" y="60" width="180" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="625" y="85" fill="#777" font-size="10">Emergency Alerts</text>
  <text x="625" y="115" fill="#e74c3c" font-size="24" font-weight="bold">3</text>
  <text x="665" y="115" fill="#e74c3c" font-size="10">⚠</text>

  <!-- Charts area -->
  <rect x="20" y="150" width="380" height="180" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="175" fill="#2c3e50" font-size="13" font-weight="bold">Platform Usage (30 Days)</text>
  <rect x="40" y="185" width="340" height="130" rx="4" fill="#eaf2f8"/>
  <text x="210" y="255" text-anchor="middle" fill="#888" font-size="11">[Bar/Line Chart: Daily active users]</text>

  <rect x="415" y="150" width="370" height="180" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="175" fill="#2c3e50" font-size="13" font-weight="bold">Clinician Workload</text>
  <rect x="435" y="185" width="330" height="130" rx="4" fill="#eaf2f8"/>
  <text x="600" y="255" text-anchor="middle" fill="#888" font-size="11">[Horizontal Bar: Sessions per clinician]</text>

  <!-- Export -->
  <rect x="20" y="345" width="765" height="55" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="378" fill="#555" font-size="12">Quick Actions:</text>
  <rect x="160" y="358" width="120" height="28" rx="4" fill="#2980b9"/>
  <text x="220" y="377" text-anchor="middle" fill="#fff" font-size="10">Export CSV</text>
  <rect x="295" y="358" width="140" height="28" rx="4" fill="#27ae60"/>
  <text x="365" y="377" text-anchor="middle" fill="#fff" font-size="10">Generate Report</text>
  <rect x="450" y="358" width="130" height="28" rx="4" fill="#f39c12"/>
  <text x="515" y="377" text-anchor="middle" fill="#fff" font-size="10">Manage Users</text>
  <rect x="595" y="358" width="130" height="28" rx="4" fill="#e74c3c"/>
  <text x="660" y="377" text-anchor="middle" fill="#fff" font-size="10">View Audit Logs</text>
</svg>