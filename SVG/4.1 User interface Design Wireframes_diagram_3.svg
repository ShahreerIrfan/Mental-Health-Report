<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" style="max-width:700px;width:100%;font-family:'Comic Sans MS','Segoe UI',sans-serif;background:#fff;border:2px solid #888;">
  <rect x="0" y="0" width="700" height="400" fill="#f5f5f5"/>
  <text x="30" y="35" fill="#2c3e50" font-size="16" font-weight="bold">Mood Tracker</text>
  <!-- Log mood section -->
  <rect x="20" y="50" width="310" height="180" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="75" fill="#2c3e50" font-size="13" font-weight="bold">Log Today's Mood</text>
  <text x="40" y="100" fill="#555" font-size="11">How are you feeling? (1-10)</text>
  <!-- Mood slider -->
  <rect x="40" y="115" width="270" height="6" rx="3" fill="#ddd"/>
  <circle cx="210" cy="118" r="10" fill="#2980b9" stroke="#fff" stroke-width="2"/>
  <text x="40" y="145" fill="#e74c3c" font-size="10">1 😢</text>
  <text x="285" y="145" fill="#27ae60" font-size="10">10 😊</text>
  <text x="40" y="170" fill="#555" font-size="11">Notes (optional)</text>
  <rect x="40" y="178" width="270" height="28" rx="3" fill="#fff" stroke="#999" stroke-width="1"/>
  <rect x="195" y="210" width="120" height="28" rx="5" fill="#27ae60"/>
  <text x="255" y="229" text-anchor="middle" fill="#fff" font-size="11">[ Save Entry ]</text>

  <!-- Chart area -->
  <rect x="350" y="50" width="330" height="180" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="370" y="75" fill="#2c3e50" font-size="13" font-weight="bold">Weekly Mood Trend</text>
  <rect x="370" y="85" width="290" height="130" rx="4" fill="#eaf2f8"/>
  <text x="515" y="155" text-anchor="middle" fill="#888" font-size="11">[Line Chart: 7-day mood trend]</text>

  <!-- History -->
  <rect x="20" y="245" width="660" height="140" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="270" fill="#2c3e50" font-size="13" font-weight="bold">Mood History</text>
  <text x="40" y="295" fill="#555" font-size="11"><tspan font-weight="bold">Apr 10</tspan> — Score: 7 — "Good day, productive"</text>
  <text x="40" y="315" fill="#555" font-size="11"><tspan font-weight="bold">Apr 09</tspan> — Score: 5 — "Feeling okay"</text>
  <text x="40" y="335" fill="#555" font-size="11"><tspan font-weight="bold">Apr 08</tspan> — Score: 3 — "Struggling a bit"</text>
  <text x="40" y="355" fill="#e74c3c" font-size="11"><tspan font-weight="bold">Apr 07</tspan> — Score: 2 ⚠ — "Very low"</text>
  <text x="40" y="375" fill="#555" font-size="11"><tspan font-weight="bold">Apr 06</tspan> — Score: 6 — "Better today"</text>
</svg>